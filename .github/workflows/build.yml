name: Build and Publish Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
build-image-linux:
  runs-on: ubuntu-latest

  steps:
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Create project structure
      run: |
        mkdir -p image/src

    - name: Generate Cargo.toml (AVIF enabled)
      run: |
        cat > image/Cargo.toml << 'EOF'
[package]
name = "image"
version = "0.1.0"
edition = "2021"

[dependencies]
image = { version = "0.25", features = ["png", "jpeg", "webp", "bmp", "gif", "tiff", "avif"] }
ravif = "0.11"
clap = { version = "4", features = ["derive"] }
EOF

    - name: Generate main.rs
      run: |
        cat > image/src/main.rs << 'EOF'
use clap::Parser;

#[derive(Parser)]
struct Args {
    input: String,
    output: String,
}

fn main() {
    let args = Args::parse();

    let img = image::open(&args.input).expect("failed to open image");
    let rgb = img.to_rgb8();

    rgb.save(&args.output).expect("failed to save image");
}
EOF

    - name: Build release
      run: |
        cd image
        cargo build --release

    - name: Prepare dist
      run: |
        mkdir -p dist
        cp image/target/release/image dist/image/linux

    - name: Make executable
      run: chmod +x dist/image/linux

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: image-linux
        path: dist/image/linux

build-image-macos:
  runs-on: macos-latest

  steps:
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Create project structure
      run: |
        mkdir -p image/src

    - name: Generate Cargo.toml (AVIF enabled)
      run: |
        cat > image/Cargo.toml << 'EOF'
[package]
name = "image"
version = "0.1.0"
edition = "2021"

[dependencies]
image = { version = "0.25", features = ["png", "jpeg", "webp", "bmp", "gif", "tiff", "avif"] }
ravif = "0.11"
clap = { version = "4", features = ["derive"] }
EOF

    - name: Generate main.rs
      run: |
        cat > image/src/main.rs << 'EOF'
use clap::Parser;

#[derive(Parser)]
struct Args {
    input: String,
    output: String,
}

fn main() {
    let args = Args::parse();

    let img = image::open(&args.input).expect("failed to open image");
    let rgb = img.to_rgb8();

    rgb.save(&args.output).expect("failed to save image");
}
EOF

    - name: Build release
      run: |
        cd image
        cargo build --release

    - name: Prepare dist
      run: |
        mkdir -p dist
        cp image/target/release/image dist/image/macos

    - name: Make executable
      run: chmod +x dist/image/macos

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: image-macos
        path: dist/image/macos

  build-markitdown-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist
        run: mkdir -p dist

      - name: Copy binary
        run: |
          cp "$HOME/.cargo/bin/markitdown" dist/markitdown/linux

      - name: Ensure executable
        run: chmod +x dist/markitdown/linux

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-binary
          path: dist/markitdown/linux

  build-markitdown-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist
        run: mkdir -p dist

      - name: Copy binary
        run: |
          cp "$HOME/.cargo/bin/markitdown" dist/markitdown/macos

      - name: Ensure executable
        run: chmod +x dist/markitdown/macos
        
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-binary
          path: dist/markitdown/macos

  commit:
    needs: [
      build-markitdown-linux, 
      build-markitdown-macos
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: linux-binary
          path: dist

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: macos-binary
          path: dist

      - name: Ensure executables
        run: chmod +x dist/*
        
      - name: Commit binaries
        uses: EndBug/add-and-commit@v10
        with:
          add: "dist"
          message: "chore: update binaries"
