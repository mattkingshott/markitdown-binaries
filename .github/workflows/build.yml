name: Build and Publish MarkItDown Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist
        run: mkdir -p dist

      - name: Copy binary
        run: |
          cp "$HOME/.cargo/bin/markitdown" dist/markitdown-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-binary
          path: dist/markitdown-linux

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist
        run: mkdir -p dist

      - name: Copy binary
        run: |
          cp "$HOME/.cargo/bin/markitdown" dist/markitdown-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-binary
          path: dist/markitdown-macos

  commit:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: linux-binary
          path: dist

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: macos-binary
          path: dist

      - name: Commit binaries
        uses: EndBug/add-and-commit@v10
        with:
          add: "dist"
          message: "chore: update markitdown binaries"
