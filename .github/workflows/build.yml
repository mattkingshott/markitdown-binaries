name: Build MarkItDown Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: markitdown-linux
          - os: macos-latest
            artifact: markitdown-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare artifact folder
        run: mkdir -p dist

      - name: Locate and copy binary (Linux/macOS)
        run: |
          BIN_PATH=$(cargo install --list | grep -A1 "markitdown" | tail -n1 | awk '{print $1}')
          
          # fallback if grep parsing fails
          if [ -z "$BIN_PATH" ]; then
            BIN_PATH="$HOME/.cargo/bin/markitdown"
          fi

          cp "$BIN_PATH" dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
