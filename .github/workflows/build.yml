name: Build and Commit MarkItDown Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist folder
        run: mkdir -p dist

      - name: Copy Linux binary
        run: |
          BIN="$HOME/.cargo/bin/markitdown"
          cp "$BIN" dist/markitdown-linux

      - name: Commit binaries
        uses: EndBug/add-and-commit@v10
        with:
          add: "dist"
          message: "chore: update markitdown linux binary"

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist folder
        run: mkdir -p dist

      - name: Copy macOS binary
        run: |
          BIN="$HOME/.cargo/bin/markitdown"
          cp "$BIN" dist/markitdown-macos

      - name: Commit binaries
        uses: EndBug/add-and-commit@v10
        with:
          add: "dist"
          message: "chore: update markitdown macos binary"
