name: Build and Publish Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-image-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout    
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools && sudo apt-get install -y nasm

      - name: Build release
        run: |
          cargo build --release \
            --manifest-path packages/image/Cargo.toml \
            --target x86_64-unknown-linux-musl

      - name: Prepare dist
        run: mkdir -p dist

      - name: Prepare artifact
        run: cp "packages/image/target/x86_64-unknown-linux-musl/release/image" dist/image-linux

      - name: Ensure executable
        run: chmod +x dist/image-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: image-linux
          path: dist/image-linux

  build-image-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout    
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: |
          cargo build --release \
            --manifest-path packages/image/Cargo.toml

      - name: Prepare dist
        run: mkdir -p dist

      - name: Debug compiled binary locations
        run: |
          echo "=== FULL WORKSPACE TREE (limited depth) ==="
          find . -maxdepth 6 -type f -executable 2>/dev/null || true

          echo ""
          echo "=== TARGET DIRECTORIES ==="
          find target -type f -maxdepth 5 2>/dev/null || true

          echo ""
          echo "=== LOOKING FOR 'image' BINARY ==="
          find . -type f -name "image" -o -name "image.exe" 2>/dev/null || true

          echo ""
          echo "=== RELEASE FOLDER CONTENTS ==="
          ls -R target/release 2>/dev/null || true

          echo ""
          echo "=== ENTIRE TARGET TREE (if exists) ==="
          ls -R target 2>/dev/null || true

      - name: Prepare artifact
        run: cp "packages/image/target/release/image" dist/image-macos

      - name: Ensure executable
        run: chmod +x dist/image-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: image-macos
          path: dist/image-macos

  build-markitdown-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist
        run: mkdir -p dist

      - name: Copy binary
        run: |
          cp "$HOME/.cargo/bin/markitdown" dist/markitdown-linux

      - name: Ensure executable
        run: chmod +x dist/markitdown-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: markitdown-linux
          path: dist/markitdown-linux

  build-markitdown-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare dist
        run: mkdir -p dist

      - name: Copy binary
        run: |
          cp "$HOME/.cargo/bin/markitdown" dist/markitdown-macos

      - name: Ensure executable
        run: chmod +x dist/markitdown-macos
        
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: markitdown-macos
          path: dist/markitdown-macos

  commit:
    needs: [
      build-image-linux,
      build-image-macos,
      build-markitdown-linux, 
      build-markitdown-macos
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: linux-binary
          path: dist

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: macos-binary
          path: dist

      - name: Ensure executables
        run: chmod +x dist/*
        
      - name: Commit binaries
        uses: EndBug/add-and-commit@v10
        with:
          add: "dist"
          message: "chore: update binaries"
