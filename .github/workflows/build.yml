name: Build MarkItDown Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: markitdown-linux
          - os: macos-latest
            artifact: markitdown-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install markitdown CLI
        run: cargo install markitdown

      - name: Prepare artifact folder
        run: mkdir -p dist

      - name: Copy binary
        run: |
          mkdir -p dist
      
          BIN="$HOME/.cargo/bin/markitdown"
      
          if [ ! -f "$BIN" ]; then
            echo "Binary not found at $BIN"
            ls -R $HOME/.cargo/bin
            exit 1
          fi
      
          cp "$BIN" dist/markitdown-${{ matrix.os }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
